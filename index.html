  { date: new Date(2026, 7, 15), type: "zahrada", people: ["Jakub Niesner", "Jaroslaw Pastuszak"] },

  { date: new Date(2026, 8, 12), type: "zahrada", people: ["Karel Pospíšilík", "Jakub Šťastný"] },

  { date: new Date(2026, 8, 26), type: "zahrada", people: ["Ivo Slavotínek", "Vojtěch Šustek"] },
  { date: new Date(2026, 9,  3), type: "kostel", people: ["Jeroným Juráň"] },

const MONTHS_CS = [
  "Leden","Únor","Březen","Duben","Květen","Červen",
  "Červenec","Srpen","Září","Říjen","Listopad","Prosinec"
];
const DAYS_CS = ["Po","Út","St","Čt","Pá","So","Ne"];

function dateKey(d) {
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

const scheduleMap = {};
SCHEDULE.forEach(entry => { scheduleMap[dateKey(entry.date)] = entry; });

// ─── Badge ───────────────────────────────────────────────────────────────────
function TypeBadge({ type, small }) {
  const isKostel = type === "kostel";
  return (
    <span style={{
      display: "inline-block",
      padding: small ? "2px 7px" : "3px 10px",
      borderRadius: 20,
      fontSize: small ? 11 : 12,
      fontWeight: 600,
      background: isKostel ? CHURCH_BG : GARDEN_BG,
      color: isKostel ? CHURCH_FG : GARDEN_FG,
      whiteSpace: "nowrap",
    }}>
      {isKostel ? "⛪ Kostel" : "🌿 Zahrada"}
    </span>
  );
}

// ─── Tabulka ─────────────────────────────────────────────────────────────────
function TableView() {
  const [done, setDone] = React.useState({});

  React.useEffect(() => {
    const ref = firebase.database().ref("hotovo");
    ref.on("value", snapshot => {
      setDone(snapshot.val() || {});
    });
    return () => ref.off();
  }, []);

  function toggleDone(i) {
    firebase.database().ref("hotovo/" + i).set(done[i] ? null : true);
  }

  return (
    <div style={{ overflowX: "auto" }}>
      <table style={{
        width: "100%", borderCollapse: "collapse",
        background: CARD_BG, borderRadius: 12, overflow: "hidden",
        boxShadow: "0 2px 8px rgba(0,0,0,0.08)",
      }}>
        <thead>
          <tr style={{ background: PLP_BLUE }}>
            {["Datum", "Den", "Typ sečení", "Sekáč / Sekáči", "Hotovo"].map(h => (
              <th key={h} style={{
                padding: "14px 18px", textAlign: "left",
                color: "#fff", fontWeight: 600, fontSize: 14,
              }}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {SCHEDULE.map((entry, i) => {
            const isDone = !!done[i];
            const bg = isDone ? "#f0fdf4" : (i % 2 === 0 ? CARD_BG : "#f7faff");
            return (
              <tr key={i} style={{
                background: bg,
                borderBottom: `1px solid ${BORDER}`,
                opacity: isDone ? 0.75 : 1,
              }}>
                <td style={{ padding: "13px 18px", fontWeight: 600, color: PLP_BLUE, whiteSpace: "nowrap" }}>
                  {entry.date.getDate()}. {MONTHS_CS[entry.date.getMonth()].toLowerCase()}
                </td>
                <td style={{ padding: "13px 18px", color: MID_GRAY, fontSize: 13 }}>
                  sobota
                </td>
                <td style={{ padding: "13px 18px" }}>
                  <TypeBadge type={entry.type} />
                </td>
                <td style={{ padding: "13px 18px", fontWeight: 500,
                  textDecoration: isDone ? "line-through" : "none",
                  color: isDone ? MID_GRAY : DARK_GRAY,
                }}>
                  {entry.people.join(" + ")}
                </td>
                <td style={{ padding: "13px 18px" }}>
                  <button
                    onClick={() => toggleDone(i)}
                    title={isDone ? "Vrátit zpět" : "Označit jako hotovo"}
                    style={{
                      width: 32, height: 32, borderRadius: 8, border: "none",
                      cursor: "pointer", fontSize: 18, lineHeight: 1,
                      background: isDone ? GARDEN_BG : "#f1f5f9",
                      color: isDone ? GARDEN_FG : MID_GRAY,
                      transition: "all 0.15s",
                      display: "flex", alignItems: "center", justifyContent: "center",
                    }}
                  >
                    {isDone ? "✓" : "○"}
                  </button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ─── Kalendář ────────────────────────────────────────────────────────────────
function CalendarView() {
  const [monthIdx, setMonthIdx] = React.useState(3); // Duben = index 3
  const MIN_MONTH = 3; // duben
  const MAX_MONTH = 9; // říjen

  function getDaysInMonth(year, month) {
    return new Date(year, month + 1, 0).getDate();
  }

  function getFirstDayOfWeek(year, month) {
    // 0=Ne,1=Po,...,6=So → convert to Mon-first (0=Po)
    const d = new Date(year, month, 1).getDay();
    return (d + 6) % 7;
  }

  const year = 2026;
  const daysInMonth = getDaysInMonth(year, monthIdx);
  const firstDow = getFirstDayOfWeek(year, monthIdx);

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  // pad to full rows
  while (cells.length % 7 !== 0) cells.push(null);

  return (
    <div>
      {/* Month nav */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "center",
        gap: 20, marginBottom: 20,
      }}>
        <button
          onClick={() => setMonthIdx(m => Math.max(MIN_MONTH, m - 1))}
          disabled={monthIdx <= MIN_MONTH}
          style={{
            background: monthIdx <= MIN_MONTH ? BORDER : PLP_BLUE,
            color: monthIdx <= MIN_MONTH ? MID_GRAY : "#fff",
            border: "none", borderRadius: 8, padding: "8px 18px",
            fontSize: 18, cursor: monthIdx <= MIN_MONTH ? "default" : "pointer",
            fontFamily: "Barlow, sans-serif", fontWeight: 600,
          }}
        >‹</button>
        <span style={{ fontSize: 22, fontWeight: 700, color: PLP_BLUE, minWidth: 180, textAlign: "center" }}>
          {MONTHS_CS[monthIdx]} {year}
        </span>
        <button
          onClick={() => setMonthIdx(m => Math.min(MAX_MONTH, m + 1))}
          disabled={monthIdx >= MAX_MONTH}
          style={{
            background: monthIdx >= MAX_MONTH ? BORDER : PLP_BLUE,
            color: monthIdx >= MAX_MONTH ? MID_GRAY : "#fff",
            border: "none", borderRadius: 8, padding: "8px 18px",
            fontSize: 18, cursor: monthIdx >= MAX_MONTH ? "default" : "pointer",
            fontFamily: "Barlow, sans-serif", fontWeight: 600,
          }}
        >›</button>
      </div>

      {/* Grid */}
      <div style={{
        background: CARD_BG, borderRadius: 12,
        boxShadow: "0 2px 8px rgba(0,0,0,0.08)", overflow: "hidden",
      }}>
        {/* Day headers */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)" }}>
          {DAYS_CS.map((d, i) => (
            <div key={d} style={{
              background: PLP_BLUE, color: "#fff",
              textAlign: "center", padding: "10px 4px",
              fontWeight: 600, fontSize: 13,
              borderRight: i < 6 ? `1px solid rgba(255,255,255,0.15)` : "none",
            }}>{d}</div>
          ))}
        </div>

        {/* Weeks */}
        {Array.from({ length: cells.length / 7 }, (_, row) => (
          <div key={row} style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)" }}>
            {cells.slice(row * 7, row * 7 + 7).map((day, col) => {
              const entry = day ? scheduleMap[dateKey(new Date(year, monthIdx, day))] : null;
              const isWeekend = col >= 5;
              const isSat = col === 5;
              return (
                <div key={col} style={{
                  minHeight: 90,
                  padding: "8px 10px",
                  borderRight: col < 6 ? `1px solid ${BORDER}` : "none",
                  borderBottom: row < cells.length / 7 - 1 ? `1px solid ${BORDER}` : "none",
                  background: !day ? "#fafbfc" : entry ? (entry.type === "kostel" ? CHURCH_BG : GARDEN_BG) : (isWeekend ? "#fafbfc" : CARD_BG),
                  opacity: !day ? 0.4 : 1,
                }}>
                  {day && (
                    <>
                      <div style={{
                        fontWeight: isSat ? 700 : 500,
                        color: entry ? (entry.type === "kostel" ? CHURCH_FG : GARDEN_FG) : (isSat ? PLP_BLUE : DARK_GRAY),
                        fontSize: 14, marginBottom: entry ? 6 : 0,
                      }}>{day}</div>
                      {entry && (
                        <div>
                          <TypeBadge type={entry.type} small />
                          <div style={{
                            marginTop: 5, fontSize: 11, fontWeight: 600,
                            color: entry.type === "kostel" ? CHURCH_FG : GARDEN_FG,
                            lineHeight: 1.4,
                          }}>
                            {entry.people.map((p, i) => (
                              <div key={i}>{p}</div>
                            ))}
                          </div>
                        </div>
                      )}
                    </>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Kontaktní formulář ───────────────────────────────────────────────────────
function ContactForm() {
  const [status, setStatus] = React.useState("idle"); // idle | sending | ok | error

  async function handleSubmit(e) {
    e.preventDefault();
    setStatus("sending");
    const form = e.target;
    const data = new FormData(form);
    try {
      const res = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: { Accept: "application/json" },
      });
      if (res.ok) {
        setStatus("ok");
        form.reset();
      } else {
        setStatus("error");
      }
    } catch {
      setStatus("error");
    }
  }

  const inputStyle = {
    width: "100%", padding: "11px 14px",
    border: `1.5px solid ${BORDER}`, borderRadius: 8,
    fontFamily: "Barlow, sans-serif", fontSize: 15, color: DARK_GRAY,
    outline: "none", transition: "border 0.15s",
    background: "#fff",
  };

  return (
    <div style={{
      background: CARD_BG, borderRadius: 12,
      boxShadow: "0 2px 8px rgba(0,0,0,0.08)",
      padding: "32px 36px", maxWidth: 560,
    }}>
      <h2 style={{ fontSize: 20, fontWeight: 700, color: PLP_BLUE, marginBottom: 6 }}>
        Napiš mi
      </h2>
      <p style={{ color: MID_GRAY, fontSize: 14, marginBottom: 24 }}>
        Nehodí se ti termín? Chceš se domluvit na výměně? Napiš mi a ozvu se zpět.
      </p>

      {status === "ok" ? (
        <div style={{
          background: GARDEN_BG, color: GARDEN_FG, borderRadius: 8,
          padding: "16px 20px", fontWeight: 600, fontSize: 15,
        }}>
          ✓ Zpráva byla odeslána. Díky!
        </div>
      ) : (
        <form
          action="https://formspree.io/f/mwvwaejq"
          method="POST"
          onSubmit={handleSubmit}
        >
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: "block", fontWeight: 600, fontSize: 14, marginBottom: 6, color: DARK_GRAY }}>
              Jméno *
            </label>
            <input
              type="text"
              name="jmeno"
              required
              placeholder="Tvoje jméno"
              style={inputStyle}
              onFocus={e => e.target.style.borderColor = PLP_BLUE}
              onBlur={e => e.target.style.borderColor = BORDER}
            />
          </div>

          <div style={{ marginBottom: 24 }}>
            <label style={{ display: "block", fontWeight: 600, fontSize: 14, marginBottom: 6, color: DARK_GRAY }}>
              Zpráva *
            </label>
            <textarea
              name="zprava"
              required
              rows={4}
              placeholder="Nehodí se mi termín od ... do ..., raději bych tento termín..."
              style={{ ...inputStyle, resize: "vertical", lineHeight: 1.5 }}
              onFocus={e => e.target.style.borderColor = PLP_BLUE}
              onBlur={e => e.target.style.borderColor = BORDER}
            />
          </div>

          {status === "error" && (
            <div style={{
              background: "#fee2e2", color: "#991b1b", borderRadius: 8,
              padding: "12px 16px", marginBottom: 16, fontSize: 14,
            }}>
              Odeslání se nezdařilo. Zkus to prosím znovu nebo napiš přímo na napiskajovi@gmail.com.
            </div>
          )}

          <button
            type="submit"
            disabled={status === "sending"}
            style={{
              background: status === "sending" ? MID_GRAY : PLP_BLUE,
              color: "#fff", border: "none", borderRadius: 8,
              padding: "12px 28px", fontSize: 15, fontWeight: 700,
              cursor: status === "sending" ? "default" : "pointer",
              fontFamily: "Barlow, sans-serif",
              transition: "background 0.15s",
            }}
          >
            {status === "sending" ? "Odesílám..." : "Odeslat zprávu"}
          </button>
        </form>
      )}
    </div>
  );
}

                  <span style={{ fontWeight: 600, color: DARK_GRAY }}>Pokud tráva není na sekání: </span>

                <span style={{ fontSize: 18, lineHeight: 1.4 }}>🔒</span>
